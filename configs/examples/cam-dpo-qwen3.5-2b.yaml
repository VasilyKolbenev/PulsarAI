# CAM Intent Classifier вЂ” Qwen 3.5 2B DPO
# Preference tuning on top of SFT adapter
# Run after cam-sft-qwen3.5-2b completes

inherit:
  - base
  - models/qwen3.5-2b
  - tasks/dpo

task: dpo

sft_adapter_path: ./outputs/cam-sft-qwen3.5-2b/lora

dataset:
  system_prompt_file: prompts/cam_taxonomy.txt

dpo:
  pairs_path: ./data/cam_dpo_pairs.jsonl
  beta: 0.1

training:
  epochs: 2
  learning_rate: 0.00005

output:
  dir: ./outputs/cam-dpo-qwen3.5-2b
