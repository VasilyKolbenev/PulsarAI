name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dev dependencies
        run: pip install -e ".[dev,ui]" black ruff mypy

      - name: Check formatting (black)
        run: black --check src/ tests/

      - name: Lint (ruff)
        run: ruff check src/ tests/

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev,ui]"

      - name: Run tests
        run: |
          python -m pytest tests/ \
            --ignore=tests/test_data.py \
            -x --timeout=60 \
            --cov=pulsar_ai --cov-report=term-missing

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check & build
        run: npm run build

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t pulsar-ai:ci .

      - name: Smoke test container
        run: |
          docker run -d --name pulsar-smoke -p 8888:8888 pulsar-ai:ci
          sleep 5
          curl -f http://localhost:8888/api/v1/health || (docker logs pulsar-smoke && exit 1)
          docker stop pulsar-smoke
