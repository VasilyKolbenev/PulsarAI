services:
  pulsar:
    build: .
    ports:
      - "${PULSAR_PORT:-8888}:8888"
    volumes:
      - pulsar-data:/app/data
    environment:
      - PULSAR_CORS_ORIGINS=${PULSAR_CORS_ORIGINS:-http://localhost:8888}
      - PULSAR_AUTH_ENABLED=${PULSAR_AUTH_ENABLED:-false}
    restart: unless-stopped

volumes:
  pulsar-data:
